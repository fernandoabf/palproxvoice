name: Build Companion (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: './companion/go.sum'

      - name: Install Node.js (required by Wails)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails app (Windows amd64)
        working-directory: ./companion
        run: wails build -platform windows/amd64 -o palproxvoice.exe

      - name: Zip do mod UE4SS
        shell: pwsh
        run: Compress-Archive -Path mod/PalProxVoice -DestinationPath PalProxVoice-mod.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: palproxvoice
          path: |
            ./companion/build/bin/palproxvoice.exe
            ./PalProxVoice-mod.zip
          retention-days: 30

      - name: Create GitHub Release and attach files
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./companion/build/bin/palproxvoice.exe
            ./PalProxVoice-mod.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
