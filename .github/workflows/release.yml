name: Build Companion (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: './companion/go.sum'

      - name: Install Node.js (required by Wails)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails app (Windows amd64)
        working-directory: ./companion
        run: wails build -platform windows/amd64 -o palproxvoice.exe

      - name: Zip do mod UE4SS (so o mod)
        shell: pwsh
        run: Compress-Archive -Path mod/PalProxVoice -DestinationPath PalProxVoice-mod.zip -Force

      # Bundle pronto: baixa o UE4SS v3.0.1 OFICIAL (estavel, nao o experimental)
      # e junta o nosso mod. O jogador extrai isto direto no Pal\Binaries\Win64\.
      - name: Montar bundle UE4SS v3.0.1 + mod
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/UE4SS-RE/RE-UE4SS/releases/download/v3.0.1/UE4SS_v3.0.1.zip" -OutFile ue4ss.zip
          New-Item -ItemType Directory -Force -Path bundle | Out-Null
          Expand-Archive -Path ue4ss.zip -DestinationPath bundle -Force
          Copy-Item -Recurse -Force mod/PalProxVoice bundle/Mods/PalProxVoice
          Compress-Archive -Path bundle/* -DestinationPath PalProxVoice-UE4SS.zip -Force

      # Instalador "1 clique": junta UE4SS+mod (bundle) + companion + config + scripts
      - name: Montar instalador
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path inst | Out-Null
          Copy-Item installer/install.ps1 inst/
          Copy-Item installer/Instalar.bat inst/
          Copy-Item PalProxVoice-UE4SS.zip inst/
          Copy-Item companion/build/bin/palproxvoice.exe inst/
          Copy-Item companion/config.json.example inst/config.json
          Compress-Archive -Path inst/* -DestinationPath PalProxVoice-Installer.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: palproxvoice
          path: |
            ./companion/build/bin/palproxvoice.exe
            ./PalProxVoice-mod.zip
            ./PalProxVoice-UE4SS.zip
            ./PalProxVoice-Installer.zip
          retention-days: 30

      - name: Create GitHub Release and attach files
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./companion/build/bin/palproxvoice.exe
            ./PalProxVoice-mod.zip
            ./PalProxVoice-UE4SS.zip
            ./PalProxVoice-Installer.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
