services:
  voice:
    build: ./server
    container_name: palproxvoice
    restart: unless-stopped
    ports:
      # 0.0.0.0 = acessivel fora do docker (host/LAN), nao so dentro do container.
      # HTTP_PORT: porta no HOST. No WSL2 a 8080 costuma estar tomada pelo Windows
      # -> usa 8088 (.env). Na VPS deixa 8080.
      - "0.0.0.0:${HTTP_PORT:-8080}:8080"            # sinalizacao (HTTP/ws)
      - "0.0.0.0:50000-50010:50000-50010/udp"        # midia (audio)
    environment:
      VOICE_PASSWORD: "${VOICE_PASSWORD:-}"
      # LOCAL no proprio PC: deixa vazio. Pra acessar de OUTRA maquina (LAN/VPS),
      # poe o IP dessa maquina aqui (pro audio achar caminho de volta). VPS: o IP publico.
      PUBLIC_IP: "${PUBLIC_IP:-}"
      # "padrao no compose": o servidor manda nome+alcance pro companion ao conectar
      SERVER_NAME: "${SERVER_NAME:-PalProxVoice}"
      VOICE_RANGE: "${VOICE_RANGE:-50}"

      # ---- anti-spoof (V1.5) — DESLIGADO por padrao ----
      # off    = confia na posicao do cliente (legado).
      # verify = reconcilia com a REST; spoof sustentado -> ignora a mentira (politica A).
      # strict = posicao sempre da REST.
      # FUNCIONA DOS 2 JEITOS (o codigo aceita qualquer URL):
      #   INTERNO (recomendado): http://<service-do-palworld>:8212  (mesma rede docker,
      #            REST nunca exposta). Ex.: http://palworld:8212
      #   EXTERNO (so se precisar): https://seu-dominio  (REST atras de proxy/Cloudflare;
      #            so com SENHA FORTE -> fica publica). Ver docs/ANTI-SPOOF-DEPLOY.md.
      PPV_AUTH_MODE: "${PPV_AUTH_MODE:-off}"
      PPV_REST_URL: "${PPV_REST_URL:-}"        # ex.: http://palworld:8212
      PPV_REST_USER: "${PPV_REST_USER:-admin}"
      PPV_REST_PASS: "${PPV_REST_PASS:-}"      # = ADMIN_PASSWORD do servidor Palworld
      PPV_POS_TOL_CM: "${PPV_POS_TOL_CM:-5000}"   # tolerancia de divergencia (cm)
      PPV_DIVERGE_POLLS: "${PPV_DIVERGE_POLLS:-4}" # polls seguidos divergindo p/ agir
      PPV_BAN: "${PPV_BAN:-0}"                  # 1 = politica B (bloqueia no nivel da voz)

      # ---- V2 (EXPERIMENTAL) — posicao+yaw autoritativos do mod SERVER-SIDE ----
      # Liga so se setar PPV_PLAYERS_FILE: caminho (DENTRO do container do voz) pro
      # feed que o mod UE4SS do servidor escreve ("fguid,x,y,z,yaw" por linha). O voz
      # e o servidor de jogo precisam COMPARTILHAR esse arquivo (volume docker comum).
      # Tem prioridade sobre a REST quando o peer esta no feed. Precisa de UE4SS no
      # servidor (ver mod-server/). Off por padrao.
      PPV_PLAYERS_FILE: "${PPV_PLAYERS_FILE:-}"     # ex.: /shared/palproxvoice_players.txt
      PPV_FEED_POLL_MS: "${PPV_FEED_POLL_MS:-100}"  # com que frequencia o voz le o feed
    networks:
      - palprox

# REDE: ESTE compose CRIA a rede "palprox" (nome fixo, sem prefixo do projeto).
# O compose do Palworld entra nela como EXTERNAL (networks: [palprox] + external: true).
# Por isso suba o voz PRIMEIRO (cria a rede), depois o Palworld.
# Assim o voz fala http://<service-do-palworld>:8212 POR DENTRO — REST nunca publica.
networks:
  palprox:
    name: palprox
