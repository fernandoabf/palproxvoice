<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f1620">
<title>PalProxVoice</title>
<style>
  :root{
    --bg:#0f1620; --card:#18222f; --line:#243243; --fg:#e6edf3; --muted:#8aa0b3;
    --accent:#3aa0ff; --good:#37d67a; --warn:#f0b429; --bad:#ff5c5c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--fg);
    max-width:560px; margin:0 auto; padding:16px; min-height:100vh;
  }
  header{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px}
  h1{font-size:18px; margin:0; font-weight:600}
  h1 small{color:var(--muted); font-weight:400}
  .pill{display:inline-flex; align-items:center; gap:7px; font-size:13px; color:var(--muted);
        background:var(--card); border:1px solid var(--line); padding:6px 11px; border-radius:999px; white-space:nowrap}
  .dot{width:9px; height:9px; border-radius:50%; background:var(--muted); flex:none}
  .dot.connecting{background:var(--warn); animation:pulse 1s infinite}
  .dot.on{background:var(--good)} .dot.err{background:var(--bad)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:14px}
  label{display:block; font-size:13px; color:var(--muted); margin-bottom:6px}
  input{width:100%; font-size:16px; padding:13px; border-radius:10px; border:1px solid var(--line);
        background:#0d141d; color:var(--fg); outline:none}
  input:focus{border-color:var(--accent)}
  .hint{font-size:13px; color:var(--muted); margin:12px 2px 0; line-height:1.45}

  button{font-family:inherit; cursor:pointer; border:none; border-radius:10px; font-size:16px}
  .primary{width:100%; padding:15px; background:var(--accent); color:#05101e; font-weight:700; margin-top:14px}
  .primary:disabled{opacity:.55}
  .danger{width:100%; padding:14px; background:transparent; color:var(--bad); border:1px solid var(--line); margin-top:6px}

  canvas{display:block; width:100%; height:auto; background:#0d141d; border:1px solid var(--line); border-radius:12px}
  .meta{font-size:12px; color:var(--muted); margin:10px 2px 0; font-family:ui-monospace,monospace}

  /* controles de toque (sem teclado no celular) */
  .pad{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px}
  .pad button{padding:18px 0; font-size:22px; background:var(--card); color:var(--fg); border:1px solid var(--line);
              user-select:none; touch-action:none}
  .pad button:active{background:#223044}
  .pad .mute{font-size:15px; font-weight:600}
  .pad .mute.muted{background:#3a1f24; color:var(--bad); border-color:#5a2a30}
  .pad .empty{visibility:hidden}

  details{margin-top:8px} summary{cursor:pointer; color:var(--muted); font-size:13px}
  #log{margin-top:8px; white-space:pre-wrap; font-family:ui-monospace,monospace; font-size:11px;
       color:var(--muted); max-height:160px; overflow:auto}
</style>
</head>
<body>
  <header>
    <h1>PalProxVoice <small>· voz por proximidade</small></h1>
    <span class="pill"><span id="dot" class="dot"></span><span id="st">desconectado</span></span>
  </header>

  <!-- entrar -->
  <section id="join" class="card">
    <label for="pw">Senha do servidor</label>
    <input id="pw" type="password" placeholder="senha (VOICE_PASSWORD)" autocomplete="off" inputmode="text">
    <button id="go" class="primary">Entrar na voz</button>
    <p class="hint">Use <b>fone</b> 🎧. O navegador vai pedir permissão do <b>microfone</b> — aceite.
       Você ouve quem está perto de você no jogo, em 3D.</p>
  </section>

  <!-- conectado -->
  <section id="live" hidden>
    <div class="card" style="padding:12px">
      <canvas id="stage" width="480" height="300"></canvas>
      <div class="meta" id="meta">—</div>
      <div class="pad">
        <button data-act="turnL" title="virar esquerda">↶</button>
        <button data-act="up"    title="frente">↑</button>
        <button data-act="turnR" title="virar direita">↷</button>
        <button data-act="left"  title="esquerda">←</button>
        <button id="mute" class="mute" title="mutar mic">🎤 Mic</button>
        <button data-act="right" title="direita">→</button>
        <button class="empty"></button>
        <button data-act="down"  title="trás">↓</button>
        <button class="empty"></button>
      </div>
    </div>
    <button id="leave" class="danger">Sair</button>
  </section>

  <details>
    <summary>Logs</summary>
    <div id="log"></div>
  </details>

<script>
// ----- mundo: posicao em CM (mesmo formato do mod: x,y,z,yaw) -----
const me = { x: 0, y: 0, z: 0, yaw: 0 };
const STEP = 100, TURN = 15, CM = 100;
const peers = {};           // id -> { x,y,z,yaw, panner, audio }
let bridgeOn = false;

const $ = id => document.getElementById(id);
const log = m => { const e=$('log'); e.textContent += m + "\n"; e.scrollTop = e.scrollHeight; };

const fwd = yaw => { const r = yaw * Math.PI / 180; return [Math.cos(r), 0, Math.sin(r)]; };

let actx, listener, ws, pc, micTrack, gotHello = false, connectWatch = null, muted = false;

function audioPos(p){ return [p.x/CM, p.z/CM, p.y/CM]; }
function placeListener(){
  if(!listener) return;
  const [ax,ay,az]=audioPos(me), [fx,fy,fz]=fwd(me.yaw);
  if(listener.positionX){
    listener.positionX.value=ax; listener.positionY.value=ay; listener.positionZ.value=az;
    listener.forwardX.value=fx; listener.forwardY.value=fy; listener.forwardZ.value=fz;
    listener.upX.value=0; listener.upY.value=1; listener.upZ.value=0;
  } else { listener.setPosition(ax,ay,az); listener.setOrientation(fx,fy,fz,0,1,0); }
}
function placePanner(p){
  if(!p.panner) return;
  const [ax,ay,az]=audioPos(p);
  if(p.panner.positionX){ p.panner.positionX.value=ax; p.panner.positionY.value=ay; p.panner.positionZ.value=az; }
  else p.panner.setPosition(ax,ay,az);
}

// ----- status pill -----
function setStatus(state, text){
  $('dot').className = 'dot' + (state ? ' '+state : '');
  $('st').textContent = text;
}

// ----- desenho top-down (centrado em VOCE) -----
const cv=$('stage'), ctx=cv.getContext('2d');
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  const cx=cv.width/2, cy=cv.height/2, S=0.03;
  const dot=(p,color,label)=>{
    const X=cx+(p.x-me.x)*S, Y=cy+(p.y-me.y)*S;
    ctx.fillStyle=color; ctx.beginPath(); ctx.arc(X,Y,8,0,7); ctx.fill();
    const [fx,,fz]=fwd(p.yaw);
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(X,Y); ctx.lineTo(X+fx*18,Y+fz*18); ctx.stroke();
    ctx.fillStyle='#cdd9e5'; ctx.font='11px ui-monospace,monospace'; ctx.fillText(label,X+11,Y-9);
  };
  for(const id in peers) if(peers[id].panner) dot(peers[id], '#ff7a59', id.slice(0,4));
  dot(me, '#3aa0ff', 'você');
  const n=Object.keys(peers).length;
  $('meta').textContent =
    `você: ${me.x.toFixed(0)},${me.y.toFixed(0)}  yaw ${me.yaw.toFixed(0)}` +
    (bridgeOn?'  [jogo]':'  [toque]') + `   ·   ${n} ouvindo`;
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ----- posicao do jogo via bridge local (no PC); no celular cai no controle de toque -----
setInterval(async ()=>{
  try{
    const r=await fetch('http://127.0.0.1:47475/pos',{cache:'no-store'});
    if(!r.ok){ bridgeOn=false; return; }
    const t=(await r.text()).trim(); if(!t) return;
    const [x,y,z,yaw]=t.split(',').map(Number);
    if([x,y,z,yaw].some(Number.isNaN)) return;
    me.x=x; me.y=y; me.z=z; me.yaw=yaw; bridgeOn=true; placeListener();
  }catch(_){ bridgeOn=false; }
},50);

// ----- movimento (teclado + toque) -----
function moveBy(dx,dy){ if(bridgeOn) return; me.x+=dx; me.y+=dy; placeListener(); }
function turnBy(d){ if(bridgeOn) return; me.yaw=(me.yaw+d+360)%360; placeListener(); }
const ACT = {
  up:()=>moveBy(0,-STEP), down:()=>moveBy(0,STEP), left:()=>moveBy(-STEP,0), right:()=>moveBy(STEP,0),
  turnL:()=>turnBy(-TURN), turnR:()=>turnBy(TURN),
};
addEventListener('keydown', e=>{
  const k=e.key.toLowerCase();
  const map={w:'up',s:'down',a:'left',d:'right',arrowleft:'turnL',arrowright:'turnR'};
  if(map[k]){ e.preventDefault(); ACT[map[k]](); }
});
// botoes de toque: segura pra repetir
document.querySelectorAll('.pad button[data-act]').forEach(b=>{
  let t=null;
  const fire=()=>ACT[b.dataset.act]();
  const start=e=>{ e.preventDefault(); fire(); clearInterval(t); t=setInterval(fire,130); };
  const stop=()=>{ clearInterval(t); t=null; };
  b.addEventListener('pointerdown',start);
  b.addEventListener('pointerup',stop);
  b.addEventListener('pointerleave',stop);
  b.addEventListener('pointercancel',stop);
});
$('mute').onclick=()=>{
  muted=!muted; if(micTrack) micTrack.enabled=!muted;
  const m=$('mute'); m.classList.toggle('muted',muted); m.textContent = muted?'🔇 Mutado':'🎤 Mic';
};

// ----- conectar / desconectar -----
$('go').onclick = connect;
$('leave').onclick = ()=>disconnect('saiu');

async function connect(){
  $('go').disabled = true;
  setStatus('connecting','conectando…');
  gotHello = false;

  try{
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    if(actx.state==='suspended') await actx.resume();
    listener = actx.listener; placeListener();
  }catch(e){ return fail('áudio não inicializou'); }

  // pede o mic ANTES de abrir o ws -> erro claro se negar
  let mic;
  try{
    mic = await navigator.mediaDevices.getUserMedia({ audio:true });
    micTrack = mic.getAudioTracks()[0];
  }catch(e){ return fail('microfone negado/indisponível'); }

  const wsURL = (location.protocol==='https:'?'wss://':'ws://') + location.host + '/ws';
  ws = new WebSocket(wsURL);
  pc = new RTCPeerConnection({ iceServers:[{urls:'stun:stun.l.google.com:19302'}] });

  // watchdog: se nao receber "hello" em 8s, e' falha (senha/servidor/rede)
  connectWatch = setTimeout(()=>{ if(!gotHello) fail('sem resposta do servidor (senha ou rede?)'); }, 8000);

  pc.ontrack = e=>{
    const id=e.streams[0].id;
    if(peers[id] && peers[id].panner) return;
    const src=actx.createMediaStreamSource(e.streams[0]);
    const panner=new PannerNode(actx,{panningModel:'HRTF',distanceModel:'inverse',refDistance:2,maxDistance:60,rolloffFactor:1});
    src.connect(panner).connect(actx.destination);
    const a=new Audio(); a.muted=true; a.srcObject=e.streams[0]; // keep-alive
    peers[id]=Object.assign(peers[id]||{x:0,y:0,z:0,yaw:0},{panner,audio:a});
    placePanner(peers[id]); log('ouvindo '+id.slice(0,8));
  };
  pc.onicecandidate = e=>{ if(e.candidate) ws.send(JSON.stringify({event:'candidate',data:JSON.stringify(e.candidate)})); };

  ws.onopen = ()=>{
    ws.send(JSON.stringify({event:'auth', data:$('pw').value}));
    mic.getTracks().forEach(t=>pc.addTrack(t,mic));
    setInterval(()=>{ if(ws && ws.readyState===1)
      ws.send(JSON.stringify({event:'pos',data:`${me.x.toFixed(1)},${me.y.toFixed(1)},${me.z.toFixed(1)},${me.yaw.toFixed(1)}`})); },100);
  };

  ws.onmessage = async ev=>{
    const m=JSON.parse(ev.data);
    if(m.event==='error'){ return fail('ERRO: '+m.data); }
    if(m.event==='hello'){ gotHello=true; clearTimeout(connectWatch); goLive(); log('conectado · id '+m.data.slice(0,8)); return; }
    if(m.event==='offer'){
      await pc.setRemoteDescription(JSON.parse(m.data));
      const ans=await pc.createAnswer(); await pc.setLocalDescription(ans);
      ws.send(JSON.stringify({event:'answer',data:JSON.stringify(ans)}));
    }
    if(m.event==='candidate'){ try{ await pc.addIceCandidate(JSON.parse(m.data)); }catch(_){} }
    if(m.event==='pos'){ const [x,y,z,yaw]=m.data.split(',').map(Number);
      placePanner(peers[m.id]=Object.assign(peers[m.id]||{},{x,y,z,yaw})); }
  };

  ws.onerror = ()=>{ if(!gotHello) fail('falha de conexão'); };
  ws.onclose = ()=>{ if(gotHello) disconnect('conexão encerrada'); };
}

function goLive(){
  setStatus('on','conectado');
  $('join').hidden = true; $('live').hidden = false;
}
function fail(msg){
  log('✕ '+msg); setStatus('err', msg);
  cleanup(); $('go').disabled = false;
}
function disconnect(reason){
  log('• '+reason); cleanup();
  setStatus('', 'desconectado');
  $('live').hidden = true; $('join').hidden = false; $('go').disabled = false;
}
function cleanup(){
  clearTimeout(connectWatch);
  try{ if(pc) pc.close(); }catch(_){} pc=null;
  try{ if(ws){ ws.onclose=null; ws.close(); } }catch(_){} ws=null;
  for(const id in peers){ try{ peers[id].audio && (peers[id].audio.srcObject=null); }catch(_){}
    try{ peers[id].panner && peers[id].panner.disconnect(); }catch(_){} delete peers[id]; }
  try{ if(micTrack) micTrack.stop(); }catch(_){} micTrack=null;
  gotHello=false;
}
</script>
</body>
</html>
